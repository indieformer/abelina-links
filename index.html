<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abelina — Links</title>
  <meta name="description" content="Abelina — a hand-crafted afterlife adventure by Gabe Askew, published by Indieformer. Wishlist, Discord, socials and press kit.">
  <link rel="icon" type="image/svg+xml" href="https://indieformer.com/favicon.svg">
  <meta property="og:title" content="Abelina — Links">
  <meta property="og:description" content="You died. And you woke up here. Wishlist, Discord, socials and press kit.">
  <meta property="og:image" content="https://indieformer.com/images/abelina/og.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --void:#0E0F18;--void-mid:#151722;--phosphor:#5FE0A6;--phosphor-bright:#93FFC9;
      --amber-bright:#FFC069;--bone:#ECE8DA;--text-secondary:#AEB6C2;--text-tertiary:#6E7689;
      --border:rgba(95,224,166,0.16);--border-mid:rgba(95,224,166,0.30);
    }
    body{min-height:100vh;background:var(--void);color:var(--bone);font-family:'Sora',Arial,sans-serif;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;}
    .bg{position:fixed;inset:0;z-index:0;background-image:url('https://indieformer.com/images/abelina/hero-bg.jpg');background-size:cover;background-position:center;filter:brightness(0.32) saturate(1.05);}
    .bg::after{content:'';position:absolute;inset:0;background:radial-gradient(70% 60% at 50% 30%,rgba(14,15,24,0.45),var(--void) 85%);}
    .wrap{position:relative;z-index:2;max-width:460px;margin:0 auto;padding:56px 22px 48px;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:100vh;}
    .logo{width:100%;max-width:300px;height:auto;margin-bottom:10px;filter:drop-shadow(0 8px 30px rgba(0,0,0,0.6));}
    .eyebrow{font-family:'Caveat',cursive;font-size:21px;color:var(--phosphor-bright);transform:rotate(-1.5deg);margin-bottom:26px;}
    .links{width:100%;display:flex;flex-direction:column;gap:12px;}
    .lnk{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 18px;border-radius:12px;font-size:15px;font-weight:600;border:1.5px solid var(--border-mid);background:rgba(21,23,34,0.72);backdrop-filter:blur(4px);color:var(--bone);transition:all .2s;text-decoration:none;}
    .lnk:hover{border-color:var(--phosphor);color:var(--phosphor-bright);transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,0.35);}
    .lnk.primary{background:var(--phosphor);color:var(--void);border-color:var(--phosphor);font-weight:700;}
    .lnk.primary:hover{background:var(--phosphor-bright);border-color:var(--phosphor-bright);color:var(--void);}
    .lnk small{display:block;font-size:11px;font-weight:400;color:var(--text-tertiary);}
    .lnk.primary small{color:rgba(14,15,24,0.7);}
    .socials{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:22px;width:100%;}
    .soc{flex:1 1 120px;max-width:140px;padding:10px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(21,23,34,0.6);font-size:12px;font-weight:600;color:var(--text-secondary);transition:all .2s;text-decoration:none;}
    .soc:hover{border-color:var(--phosphor);color:var(--phosphor-bright);}
    .soc span{display:block;font-size:10px;font-weight:400;color:var(--text-tertiary);}
    .foot{margin-top:auto;padding-top:30px;font-size:12px;color:var(--text-tertiary);}
    .foot a{color:var(--text-secondary);text-decoration:none;}
    .foot a:hover{color:var(--phosphor-bright);}
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="wrap">
    <img class="logo" src="https://indieformer.com/images/abelina/logo.png" alt="Abelina">
    <div class="eyebrow">a hand-crafted afterlife · published by Indieformer</div>

    <div class="links">
      <a class="lnk primary" href="https://store.steampowered.com/app/3682900/Abelina/" target="_blank" rel="noopener">✦ Wishlist on Steam</a>
      <a class="lnk" href="https://discord.gg/xE9eTQNJT4" target="_blank" rel="noopener">Join the Discord <small>watch us build it in the open</small></a>
      <a class="lnk" href="https://indieformer.com/abelina/presskit/" target="_blank" rel="noopener">Press Kit <small>factsheet, screenshots, logos</small></a>
      <a class="lnk" href="https://gabeaskew.com/abelina" target="_blank" rel="noopener">Dev site</a>
    </div>

    <div class="socials">
      <a class="soc" href="https://bsky.app/profile/abelinagame.bsky.social" target="_blank" rel="noopener">Bluesky<span>@abelinagame</span></a>
      <a class="soc" href="https://threads.net/@glabe_raskew" target="_blank" rel="noopener">Threads<span>@glabe_raskew</span></a>
      <a class="soc" href="https://www.instagram.com/glabe_raskew" target="_blank" rel="noopener">Instagram<span>@glabe_raskew</span></a>
      <a class="soc" href="https://www.tiktok.com/@glabe_raskew" target="_blank" rel="noopener">TikTok<span>@glabe_raskew</span></a>
      <a class="soc" href="https://www.youtube.com/@AbelinaTheGame" target="_blank" rel="noopener">YouTube<span>@AbelinaTheGame</span></a>
    </div>

    <div class="foot">An <a href="https://indieformer.com/">Indieformer</a> game</div>
  </div>
</body>

</html>
