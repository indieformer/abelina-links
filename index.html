  <title>Abelina — Links</title>
  <meta name="description" content="Abelina — a hand-crafted afterlife adventure by Gabe Askew, published by Indieformer. Wishlist, Discord, socials and press kit.">
  <link rel="icon" type="image/svg+xml" href="https://indieformer.com/favicon.svg">
  <meta property="og:title" content="Abelina — Links">
  <meta property="og:description" content="You died. And you woke up here. Wishlist, Discord, socials and press kit.">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --void:#0E0F18;--void-mid:#151722;--phosphor:#5FE0A6;--phosphor-bright:#93FFC9;
      --amber-bright:#FFC069;--bone:#ECE8DA;--text-secondary:#AEB6C2;--text-tertiary:#8A93A6;
      --border:rgba(95,224,166,0.18);--border-mid:rgba(95,224,166,0.34);
    }
    body{min-height:100vh;background:var(--void);color:var(--bone);font-family:'Sora',Arial,sans-serif;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;}
    .bg{position:fixed;inset:0;z-index:0;background-image:url('https://indieformer.com/images/abelina/hero-bg.jpg');background-size:cover;background-position:center;filter:brightness(0.78) saturate(1.08);}
    .bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,15,24,0.35) 0%,rgba(14,15,24,0.28) 40%,rgba(14,15,24,0.66) 100%);}
    .wrap{position:relative;z-index:2;max-width:470px;margin:0 auto;padding:54px 22px 46px;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:100vh;}
    .logo{width:100%;max-width:300px;height:auto;margin-bottom:10px;filter:drop-shadow(0 6px 26px rgba(0,0,0,0.7));}
    .eyebrow{font-family:'Caveat',cursive;font-size:21px;color:var(--phosphor-bright);transform:rotate(-1.5deg);margin-bottom:26px;text-shadow:0 2px 10px rgba(0,0,0,0.7);}
    .links{width:100%;display:flex;flex-direction:column;gap:12px;}
    .lnk{display:flex;align-items:center;gap:13px;width:100%;padding:14px 18px;border-radius:12px;font-size:15px;font-weight:600;border:1.5px solid var(--border-mid);background:rgba(16,17,26,0.78);backdrop-filter:blur(6px);color:var(--bone);transition:all .2s;text-decoration:none;text-align:left;}
    .lnk:hover{border-color:var(--phosphor);color:var(--phosphor-bright);transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,0.4);}
    .lnk svg{width:22px;height:22px;flex:0 0 22px;}
    .lnk .t{flex:1;}
    .lnk small{display:block;font-size:11px;font-weight:400;color:var(--text-tertiary);}
    .lnk.primary{background:var(--phosphor);color:var(--void);border-color:var(--phosphor);font-weight:700;justify-content:center;text-align:center;}
    .lnk.primary:hover{background:var(--phosphor-bright);border-color:var(--phosphor-bright);color:var(--void);}
    .socials{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:22px;width:100%;}
    .soc{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1 1 80px;max-width:96px;padding:12px 6px;border-radius:11px;border:1px solid var(--border);background:rgba(16,17,26,0.7);font-size:11px;font-weight:600;color:var(--text-secondary);transition:all .2s;text-decoration:none;}
    .soc:hover{border-color:var(--phosphor);color:var(--phosphor-bright);transform:translateY(-2px);}
    .soc svg{width:20px;height:20px;}
    .foot{margin-top:auto;padding-top:30px;font-size:12px;color:var(--text-secondary);}
    .foot a{color:var(--bone);text-decoration:none;}
    .foot a:hover{color:var(--phosphor-bright);}
  </style>
</head>
